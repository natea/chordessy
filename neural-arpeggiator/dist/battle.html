<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chordessy - Battle Mode</title>
  <link href="https://fonts.googleapis.com/css?family=Abel" rel="stylesheet">
  <link rel="stylesheet" href="./battle.css">
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.13.1/underscore-min.js"></script>
  <script src="https://unpkg.com/@tonaljs/tonal@4.6.5/build/tonal.min.js"></script>
  <script src="https://unpkg.com/webmidi@2.5.4/dist/browser/webmidi.min.iife.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/magenta-js@2.1.1/build/magenta.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web-audio-daw@1.1.0/build/wad.min.js"></script>
</head>
<body>
  <div id="battle-container">
    <div id="hud-bar">
      <div class="hud-section">
        <span class="hud-label">Score:</span>
        <span id="score-display">0</span>
      </div>
      <div class="hud-section">
        <span class="hud-label">Combo:</span>
        <span id="combo-display">0</span>
      </div>
      <div class="hud-section">
        <span class="hud-label">Level:</span>
        <span id="level-display">1</span>
      </div>
      <div class="hud-section">
        <span class="hud-label">Lives:</span>
        <span id="lives-display">3</span>
      </div>
    </div>

    <!-- Phaser canvas mount point -->
    <div id="phaser-container"></div>

    <div id="chord-prompt">
      <div class="prompt-header">Play the chord:</div>
      <div id="chord-display" class="chord-name">C Major</div>
      <div id="chord-notes" class="chord-notes">C - E - G</div>
    </div>

    <div id="keyboard-area"></div>

    <div id="start-screen-overlay" class="overlay">
      <div class="overlay-content">
        <h1 class="game-title">Neural Arpeggiator</h1>
        <h2 class="game-subtitle">Battle Mode</h2>
        <p class="game-description">Play chords to defeat waves of enemies! Listen to the chord prompt and play the correct notes on your keyboard.</p>
        <button id="start-button" class="game-button">Start Battle</button>
      </div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
      <div class="overlay-content">
        <h1 class="game-over-title">Game Over</h1>
        <div class="final-stats">
          <p>Final Score: <span id="final-score">0</span></p>
          <p>Max Combo: <span id="max-combo">0</span></p>
          <p>Level Reached: <span id="final-level">1</span></p>
        </div>
        <button id="restart-button" class="game-button">Play Again</button>
        <button id="menu-button" class="game-button">Main Menu</button>
      </div>
    </div>
  </div>

  <script src="./shared.js"></script>
  <script src="./chords-db.js"></script>
  <script src="./battle.js"></script>
</body>
</html>
